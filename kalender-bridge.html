<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalender-Agent · Reply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b0e;
      --surface:   #0d1117;
      --border:    #161c24;
      --border2:   #1e2736;
      --green:     #3ddc84;
      --green-dim: #1a3a2a;
      --green-mid: #2d6649;
      --text:      #d4dce8;
      --muted:     #4a5a6e;
      --faint:     #1e2736;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      width: 28px; height: 28px;
      background: var(--green-dim);
      border: 1px solid var(--green-mid);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.04em;
    }
    .header-sep { color: var(--faint); }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .slack-link {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 4px 10px;
      transition: color 0.15s, border-color 0.15s;
    }
    .slack-link:hover { color: var(--green); border-color: var(--green-mid); }

    /* ── context panel ── */
    #context-panel {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      animation: fadeDown 0.3s ease both;
    }
    .ctx-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .ctx-text {
      color: #8a9bb0;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      max-height: 90px;
      overflow: hidden;
      position: relative;
    }
    .ctx-text::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 32px;
      background: linear-gradient(transparent, var(--surface));
    }
    .ctx-meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 10px;
      color: var(--faint);
    }
    .ctx-meta span { color: var(--muted); }

    /* ── messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .empty-state {
      margin: auto;
      text-align: center;
      animation: fadeUp 0.4s ease both 0.1s;
    }
    .empty-icon { font-size: 32px; margin-bottom: 16px; opacity: 0.3; }
    .empty-text { color: var(--muted); font-size: 12px; line-height: 1.8; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 7px 14px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .suggestion:hover { color: var(--green); border-color: var(--green-mid); background: var(--green-dim); }

    /* message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      margin-bottom: 18px;
      animation: fadeUp 0.25s ease both;
    }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: var(--green-dim);
      border: 1px solid var(--green-mid);
      border-bottom-right-radius: 3px;
      color: #a8e6c0;
    }
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }
    .msg-meta {
      font-size: 10px;
      color: var(--faint);
      margin-top: 5px;
      letter-spacing: 0.05em;
    }
    .msg.assistant .msg-meta { color: var(--green-mid); }

    /* typing indicator */
    .typing .bubble {
      padding: 14px 18px;
    }
    .dots { display: flex; gap: 5px; align-items: center; }
    .dots span {
      width: 5px; height: 5px;
      background: var(--green-mid);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── input area ── */
    #input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    #msg-input:focus { border-color: var(--green-mid); }
    #msg-input::placeholder { color: var(--faint); }

    #send-btn {
      background: var(--green-dim);
      border: 1px solid var(--green-mid);
      border-radius: 8px;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--green);
      font-size: 16px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #1f4a32; border-color: var(--green); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-hint {
      font-size: 10px;
      color: var(--faint);
      margin-top: 8px;
      letter-spacing: 0.05em;
    }
    .input-hint .posted { color: var(--green-mid); }

    /* ── status bar ── */
    #status-bar {
      height: 28px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease infinite;
    }
    .status-dot.idle { background: var(--muted); animation: none; }
    .status-dot.error { background: #e05a5a; animation: none; }

    /* ── loading overlay ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
      animation: fadeUp 0.3s ease both;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; }

    /* ── animations ── */
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    @keyframes bounce   { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🗓</div>
    <span class="header-title">Kalender-Agent</span>
    <span class="header-sep">›</span>
    <span class="header-sub" id="header-channel">#kalender-log</span>
    <a id="slack-link" href="#" target="_blank" class="slack-link">In Slack öffnen ↗</a>
  </header>

  <div id="context-panel">
    <div class="ctx-label">Thread-Kontext</div>
    <div class="ctx-text" id="ctx-text">Lade Kontext…</div>
    <div class="ctx-meta">
      <div>Von: <span id="ctx-author">–</span></div>
      <div>Zeit: <span id="ctx-time">–</span></div>
      <div id="ctx-replies" style="display:none">Antworten: <span id="ctx-reply-count">0</span></div>
    </div>
  </div>

  <div id="messages">
    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Lade Thread aus Slack…</div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Nachricht an Kalender-Agent… (Enter zum Senden)" rows="1" disabled></textarea>
      <button id="send-btn" disabled title="Senden">➤</button>
    </div>
    <div class="input-hint">Antworten werden automatisch als <span class="posted">Thread-Reply in Slack</span> gepostet</div>
  </div>

  <div id="status-bar">
    <div class="status-dot idle" id="status-dot"></div>
    <span id="status-text">Initialisiere…</span>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const ANTHROPIC_API  = "https://api.anthropic.com/v1/messages";
const SLACK_MCP_URL  = "https://mcp.slack.com/mcp";
const CHANNEL_ID     = "C0AJC9ZMSKX";
const CHANNEL_NAME   = "kalender-log";
const SLACK_BASE     = "https://mansio-logistics.slack.com/archives";

// ── State ─────────────────────────────────────────────────────────────────
let threadTs      = null;
let threadText    = "";
let threadReplies = [];
let chatHistory   = [];
let busy          = false;

// ── DOM refs ──────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById("messages");
const loadingEl   = document.getElementById("loading");
const inputEl     = document.getElementById("msg-input");
const sendBtn     = document.getElementById("send-btn");
const statusDot   = document.getElementById("status-dot");
const statusText  = document.getElementById("status-text");
const ctxTextEl   = document.getElementById("ctx-text");
const ctxAuthor   = document.getElementById("ctx-author");
const ctxTime     = document.getElementById("ctx-time");
const ctxReplies  = document.getElementById("ctx-replies");
const ctxReplyN   = document.getElementById("ctx-reply-count");
const slackLink   = document.getElementById("slack-link");

// ── Helpers ───────────────────────────────────────────────────────────────
function ts2str(ts) {
  if (!ts) return "–";
  return new Date(parseFloat(ts) * 1000).toLocaleString("de-DE", {
    day:"2-digit", month:"2-digit", year:"numeric",
    hour:"2-digit", minute:"2-digit"
  });
}

function setStatus(text, state = "active") {
  statusText.textContent = text;
  statusDot.className = "status-dot " + (state === "active" ? "" : state);
}

function parseJSON(text) {
  try {
    const clean = text.replace(/```json|```/g, "").trim();
    const match = clean.match(/[\[{][\s\S]*[\]}]/);
    return match ? JSON.parse(match[0]) : [];
  } catch { return []; }
}

async function callClaude(messages, system, withMCP = true) {
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    system,
    messages,
  };
  if (withMCP) body.mcp_servers = [{ type: "url", url: SLACK_MCP_URL, name: "slack" }];
  const res = await fetch(ANTHROPIC_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return res.json();
}

function getText(data) {
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("") || "";
}

// ── Render ────────────────────────────────────────────────────────────────
function renderEmpty() {
  loadingEl?.remove();
  if (document.querySelector(".empty-state")) return;
  messagesEl.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-text">Thread geladen. Stelle eine Frage oder gib eine Anweisung.<br>Die Antwort wird automatisch in Slack gepostet.</div>
      <div class="suggestions">
        <button class="suggestion" onclick="fillInput('Fasse diesen Thread zusammen')">Zusammenfassen</button>
        <button class="suggestion" onclick="fillInput('Was sind die nächsten Schritte?')">Nächste Schritte</button>
        <button class="suggestion" onclick="fillInput('Erstelle ein strukturiertes Follow-up')">Follow-up erstellen</button>
        <button class="suggestion" onclick="fillInput('Wer ist für welche Aufgabe zuständig?')">Zuständigkeiten</button>
      </div>
    </div>`;
}

function fillInput(text) {
  inputEl.value = text;
  inputEl.focus();
  autoResize();
}

function addBubble(role, text, posted = false) {
  document.querySelector(".empty-state")?.remove();
  document.querySelector(".typing")?.remove();

  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="bubble">${escHtml(text)}</div>
    <div class="msg-meta">${role === "user" ? "Du" : posted ? "✓ Claude → in Slack gepostet" : "Claude"}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  document.querySelector(".typing")?.remove();
  const div = document.createElement("div");
  div.className = "msg assistant typing";
  div.innerHTML = `<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

// ── Init: read URL params & load thread ──────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  threadTs = params.get("ts") || null;

  // Update Slack link
  if (threadTs) {
    const tsClean = threadTs.replace(".", "");
    slackLink.href = `${SLACK_BASE}/${CHANNEL_ID}/p${tsClean}`;
  } else {
    slackLink.href = `${SLACK_BASE}/${CHANNEL_ID}`;
  }

  if (!threadTs) {
    // No ts param → show channel overview
    ctxTextEl.textContent = "Kein Thread angegeben. Zeige letzte Nachrichten aus #" + CHANNEL_NAME;
    setStatus("Bereit", "idle");
    await loadChannelMessages();
    return;
  }

  setStatus("Lade Thread aus Slack…");

  try {
    // Load thread context
    const data = await callClaude(
      [{ role: "user", content: `Read thread ts="${threadTs}" from channel "${CHANNEL_ID}". Return ONLY JSON: {"parent":{"text":"...","user":"...","ts":"...","reply_count":0},"replies":[{"text":"...","name":"...","ts":"..."}]}. No markdown.` }],
      "You are a Slack data fetcher. Use slack MCP tools. Return ONLY raw JSON."
    );

    const raw = getText(data);
    const parsed = parseJSON(raw);

    if (parsed && parsed.parent) {
      threadText = parsed.parent.text || "";
      threadReplies = parsed.replies || [];

      ctxTextEl.textContent = threadText;
      ctxAuthor.textContent = parsed.parent.user || "–";
      ctxTime.textContent   = ts2str(parsed.parent.ts || threadTs);
      if (parsed.parent.reply_count > 0) {
        ctxReplies.style.display = "block";
        ctxReplyN.textContent = parsed.parent.reply_count;
      }
    } else {
      ctxTextEl.textContent = "(Thread konnte nicht geladen werden)";
    }

    loadingEl?.remove();
    renderEmpty();
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
    setStatus("Bereit", "idle");

  } catch (e) {
    ctxTextEl.textContent = "Fehler beim Laden des Threads.";
    setStatus("Fehler", "error");
    loadingEl?.remove();
    renderEmpty();
  }
}

async function loadChannelMessages() {
  setStatus("Lade #" + CHANNEL_NAME + "…");
  try {
    const data = await callClaude(
      [{ role: "user", content: `Get last 10 messages from channel "${CHANNEL_ID}". Return ONLY JSON array: [{"ts":"...","text":"...","user":"...","reply_count":0}]. No markdown.` }],
      "You are a Slack data fetcher. Use slack MCP tools. Return ONLY raw JSON array."
    );
    const msgs = parseJSON(getText(data));
    loadingEl?.remove();
    messagesEl.innerHTML = "";

    if (!msgs.length) {
      messagesEl.innerHTML = `<div class="empty-state"><div class="empty-text">Keine Nachrichten gefunden.</div></div>`;
    } else {
      msgs.forEach(m => {
        const tsClean = (m.ts || "").replace(".", "");
        const url = `?ts=${m.ts}`;
        const div = document.createElement("div");
        div.style.cssText = "padding:14px;border:1px solid var(--border2);border-radius:10px;margin-bottom:10px;cursor:pointer;background:var(--surface);transition:border-color 0.15s;animation:fadeUp 0.25s ease both";
        div.innerHTML = `
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="color:var(--green);font-size:11px">${escHtml(m.user||"–")}</span>
            <span style="color:var(--muted);font-size:10px">${ts2str(m.ts)}</span>
          </div>
          <div style="color:#8a9bb0;font-size:12px;line-height:1.6">${escHtml((m.text||"").slice(0,160))}${(m.text||"").length>160?"…":""}</div>
          ${m.reply_count>0?`<div style="margin-top:8px;font-size:10px;color:var(--green-mid)">💬 ${m.reply_count} Antwort${m.reply_count!==1?"en":""}</div>`:""}`;
        div.onmouseenter = () => div.style.borderColor = "var(--green-mid)";
        div.onmouseleave = () => div.style.borderColor = "var(--border2)";
        div.onclick = () => window.location.href = url;
        messagesEl.appendChild(div);
      });
    }
    inputEl.disabled = false;
    sendBtn.disabled = false;
    setStatus("Bereit", "idle");
  } catch {
    setStatus("Fehler", "error");
  }
}

// ── Send message ──────────────────────────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  busy = true;
  inputEl.value = "";
  autoResize();
  inputEl.disabled = true;
  sendBtn.disabled = true;

  addBubble("user", text);
  showTyping();
  setStatus("Claude analysiert…");

  const ctxLines = threadReplies.map(r => `${r.name||"user"}: ${r.text}`).join("\n");
  const system = `Du bist der Kalender-Agent für MANSIO Logistics. Du unterstützt bei Meeting-Nachbereitungen, Aufgabenplanung und Koordination.

Slack-Kanal: #${CHANNEL_NAME}
Thread-Nachricht:
"${threadText}"

Bisheriger Thread-Verlauf:
${ctxLines || "(noch keine Antworten)"}

Antworte präzise und strukturiert auf Deutsch. Nutze Aufzählungen wenn sinnvoll.`;

  const apiMessages = [
    ...chatHistory.map(m => ({ role: m.role, content: m.text })),
    { role: "user", content: text },
  ];

  try {
    // 1. Claude reply
    const data = await callClaude(apiMessages, system, false);
    const reply = getText(data) || "Keine Antwort.";

    // 2. Post to Slack
    setStatus("Poste in Slack…");
    await callClaude(
      [{ role: "user", content: `Post as thread reply to ts="${threadTs}" in channel "${CHANNEL_ID}":\n\n${reply}` }],
      "You are a Slack bot. Use the slack MCP tool to post a thread reply immediately."
    );

    document.querySelector(".typing")?.remove();
    addBubble("assistant", reply, true);
    chatHistory.push({ role: "user", text }, { role: "assistant", text: reply });

    setStatus("✓ In Slack gepostet", "idle");
    setTimeout(() => setStatus("Bereit", "idle"), 3000);

  } catch (e) {
    document.querySelector(".typing")?.remove();
    addBubble("assistant", "Fehler beim Verarbeiten der Anfrage. Bitte versuche es erneut.");
    setStatus("Fehler", "error");
  }

  busy = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Input auto-resize & keyboard ─────────────────────────────────────────
function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
}

inputEl.addEventListener("input", autoResize);
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener("click", send);

// ── Boot ──────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
